name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Pinned to keep builds reproducible. Bump deliberately, not automatically.
env:
  HUGO_VERSION: "0.162.1"

permissions:
  contents: read

jobs:
  lint-scss:
    name: Lint SCSS (stylelint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # Activate the pnpm version pinned in package.json's "packageManager" field.
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  build:
    name: Build site (Hugo extended)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Hugo extended
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - name: Build
        run: hugo --gc --minify --baseURL "/"
      - name: Upload built site
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site
          path: public/
          retention-days: 7

  link-check:
    name: Link check (lychee, offline)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Download built site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site
          path: public
      - name: Check internal links and assets
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # --offline: verify that linked local files/assets exist, without
          # hitting the network. Avoids flaky external checks and the
          # intentional placeholder URLs in the demo content.
          args: --offline --root-dir "${{ github.workspace }}/public" --no-progress "./public/**/*.html"
          fail: true
