<div class="call">
  <div class="call-box-top">
    {{ if hugo.Data.contact.phone }}
        <div class="call-phone"><strong>Phone: </strong>
          {{ with hugo.Data.contact.phone_tel }}
            <a href="tel:{{ . }}">{{ hugo.Data.contact.phone }}</a>
          {{ else }}
            {{ hugo.Data.contact.phone }}
          {{ end }}
        </div>
    {{ end }}
    {{ if hugo.Data.contact.email }}
    <div class="call-email"><strong>Email: </strong>
      <a href="mailto:{{ hugo.Data.contact.email }}">
        {{ hugo.Data.contact.email }}
      </a>
    </div>
    {{ end }}
  </div>
    {{ if eq .show_button "true" }}
      <div class="call-box-bottom">
        <a href="{{ hugo.Data.contact.contact_button_link | relURL }}" class="button">Contact</a>
      </div>
    {{ end }}
</div>
